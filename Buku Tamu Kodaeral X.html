<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buku Tamu Digital Kantor Kodaeral X</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: url('siluet-kantor.png') no-repeat center fixed;
      background-size: cover;
      color: #001F3F;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #001F3F;
      color: white;
      text-align: center;
      padding: 20px;
    }
    form {
      background-color: white;
      margin: 40px auto;
      padding: 20px;
      border-radius: 10px;
      width: 80%;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background-color: #001F3F;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }
    table {
      width: 90%;
      margin: 20px auto;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }
    th {
      background-color: #001F3F;
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <h1>Buku Tamu Digital Kantor Kodaeral X</h1>
  </header>

  <form id="guestForm">
    <label>Nama Lengkap:</label>
    <input type="text" id="nama" required>
    <label>Pangkat:</label>
    <input type="text" id="pangkat" required>
    <label>Jabatan:</label>
    <input type="text" id="jabatan" required>
    <label>Kata-kata Mutiara:</label>
    <textarea id="mutiara" required></textarea>
    <label>Tanda Tangan:</label>
    <canvas id="signature" width="300" height="100" style="border:1px solid #ccc;"></canvas><br>
    <button type="button" onclick="simpanData()">Simpan Data</button>
    <button type="button" onclick="hapusDaftar()">Hapus Semua</button>
    <button type="button" onclick="unduhCSV()">Unduh CSV</button>
  </form>

  <h2 style="text-align:center;">Daftar Tamu</h2>
  <table id="guestList">
    <tr>
      <th>No</th>
      <th>Nama</th>
      <th>Pangkat</th>
      <th>Jabatan</th>
      <th>Kata-kata Mutiara</th>
      <th>Tanda Tangan</th>
    </tr>
  </table>

  <script>
    let daftarTamu = [];
    let canvas = document.getElementById('signature');
    let ctx = canvas.getContext('2d');
    let drawing = false;

    // Event menggambar di canvas
    canvas.addEventListener('mousedown', () => { drawing = true; ctx.beginPath(); });
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mouseout', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', draw);

    function draw(e) {
      if (!drawing) return;
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#000';
      ctx.lineTo(e.offsetX, e.offsetY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.offsetX, e.offsetY);
    }

    // Simpan data tamu
    function simpanData() {
      const nama = document.getElementById('nama').value;
      const pangkat = document.getElementById('pangkat').value;
      const jabatan = document.getElementById('jabatan').value;
      const mutiara = document.getElementById('mutiara').value;
      const tandaTangan = canvas.toDataURL();

      if(nama && pangkat && jabatan && mutiara) {
        daftarTamu.push({nama, pangkat, jabatan, mutiara, tandaTangan});
        tampilkanDaftar();
        document.getElementById('guestForm').reset();
        ctx.clearRect(0, 0, canvas.width, canvas.height); // reset canvas
      }
    }

    // Tampilkan daftar tamu
    function tampilkanDaftar() {
      const table = document.getElementById('guestList');
      table.innerHTML = `<tr>
        <th>No</th><th>Nama</th><th>Pangkat</th><th>Jabatan</th><th>Kata-kata Mutiara</th><th>Tanda Tangan</th>
      </tr>`;
      
      daftarTamu.forEach((tamu, index) => {
        table.innerHTML += `<tr>
          <td>${index+1}</td>
          <td>${tamu.nama}</td>
          <td>${tamu.pangkat}</td>
          <td>${tamu.jabatan}</td>
          <td>${tamu.mutiara}</td>
          <td><img src="${tamu.tandaTangan}" width="150"/></td>
        </tr>`;
      });
    }

    // Hapus semua daftar tamu
    function hapusDaftar() {
      daftarTamu = [];
      tampilkanDaftar();
    }

    // Unduh daftar tamu sebagai CSV
    function unduhCSV() {
      let csvContent = "data:text/csv;charset=utf-8,No,Nama,Pangkat,Jabatan,Kata-kata Mutiara\n";
      daftarTamu.forEach((tamu, index) => {
        csvContent += `${index+1},${tamu.nama},${tamu.pangkat},${tamu.jabatan},${tamu.mutiara}\n`;
      });
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", "daftar_tamu.csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
